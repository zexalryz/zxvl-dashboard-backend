services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: auth_api
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_api"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_PORT: 4000
      CORS_ORIGIN: http://localhost:3000
      DATABASE_URL: postgresql://auth_user:auth_pass@db:5432/auth_api
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRATION: 15m
      THROTTLE_TTL: 60
      THROTTLE_LIMIT: 60
    # Before first deploy, switch Prisma provider to PostgreSQL:
    #   docker compose exec api npm run db:switch postgres && docker compose restart api

volumes:
  pgdata:
